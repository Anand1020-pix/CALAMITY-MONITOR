services:
  - type: web
    name: calamity-monitor-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGINS
        value: https://your-project.vercel.app
      - key: NEWS_API_KEY
        sync: false
